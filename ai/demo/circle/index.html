<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圆形轨道拖拽</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="circle-track"></div>
    <div class="item" data-angle="0">1</div>
    <div class="item" data-angle="60">2</div>
    <div class="item" data-angle="120">3</div>
    <div class="item" data-angle="180">4</div>
    <div class="item" data-angle="240">5</div>
    <div class="item" data-angle="300">6</div>
  </div>
  <div class="panel">
    <div id="panel-display">
      <input type="text" id="itemText" placeholder="选择一个项目">
    </div>
    <div id="panel-control">
      <button id="addBtn">add</button>
      <button id="deleteBtn">delete</button>
      <button id="task-break">TB</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
