<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>圆形轨道拖动</title>
  <style>
    .container {
      width: 400px;
      height: 400px;
      border: 2px solid #eee;
      border-radius: 50%;
      position: relative;
      margin: 50px auto;
    }
    .drag-item {
      width: 30px;
      height: 30px;
      background: #409eff;
      border-radius: 50%;
      position: absolute;
      cursor: grab;
      /* 居中圆点 */
      transform: translate(-50%, -50%);
    }
    .control {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container" id="circle"></div>
  <div class="control">
    角度：<input type="number" id="angleInput" value="0" /> °
  </div>

  <script>
    // ========== 配置 ==========
    const circle = document.getElementById('circle')
    const item = document.createElement('div')
    item.className = 'drag-item'
    circle.appendChild(item)

    // 圆心坐标 & 固定半径
    const radius = 180
    let centerX, centerY
    let currentAngle = 0

    // ========== 核心：角度 → 坐标 ==========
    function setPositionByAngle(angle) {
      currentAngle = angle
      const radian = (angle * Math.PI) / 180 // 转弧度

      const x = centerX + radius * Math.cos(radian)
      const y = centerY + radius * Math.sin(radian)

      item.style.left = x + 'px'
      item.style.top = y + 'px'
      angleInput.value = Math.round(angle)
    }

    // ========== 拖动逻辑 ==========
    function startDrag(e) {
      e.preventDefault()
      document.addEventListener('mousemove', onDrag)
      document.addEventListener('mouseup', stopDrag)
    }

    function onDrag(e) {
      // 鼠标坐标
      const mx = e.clientX
      const my = e.clientY

      // 计算鼠标相对于圆心的角度
      const dx = mx - centerX
      const dy = my - centerY
      let angle = (Math.atan2(dy, dx) * 180) / Math.PI

      // 转为 0~360
      if (angle < 0) angle += 360

      setPositionByAngle(angle)
    }

    function stopDrag() {
      document.removeEventListener('mousemove', onDrag)
      document.removeEventListener('mouseup', stopDrag)
    }

    // ========== 初始化 ==========
    function init() {
      const rect = circle.getBoundingClientRect()
      centerX = rect.left + rect.width / 2
      centerY = rect.top + rect.height / 2
      setPositionByAngle(0)
    }

    // 输入框控制角度
    angleInput.addEventListener('input', (e) => {
      setPositionByAngle(Number(e.target.value))
    })

    item.addEventListener('mousedown', startDrag)
    window.addEventListener('load', init)
    window.addEventListener('resize', init)
  </script>
</body>
</html>
