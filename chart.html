<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专注历史</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(120, 120, 120, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: drift 60s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .chart-container {
      position: relative;
      width: 95vw;
      height: 90vh;
      max-width: 1600px;
      padding: 32px;
      background: rgba(45, 45, 45, 0.4);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
    }

    .chart-header {
      margin-bottom: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .chart-title {
      font-size: 24px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .chart-subtitle {
      font-size: 13px;
      color: #999;
      font-weight: 400;
    }

    .chart-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .tab {
      padding: 12px 28px;
      background: rgba(60, 60, 60, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #b0b0b0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .tab::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tab:hover {
      background: rgba(70, 70, 70, 0.6);
      border-color: rgba(255, 255, 255, 0.15);
      color: #e0e0e0;
      transform: translateY(-2px);
    }

    .tab:hover::before {
      opacity: 1;
    }

    .tab.active {
      background: rgba(90, 90, 90, 0.7);
      border-color: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .chart-wrapper {
      position: relative;
      flex: 1;
      padding: 24px;
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    #fire-chart {
      width: 100% !important;
      height: 100% !important;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <div class="chart-header">
      <h1 class="chart-title">专注历史</h1>
      <p class="chart-subtitle">追踪你的专注时光</p>
    </div>

    <div class="chart-tabs">
      <button class="tab active" data-view="daily">按天</button>
      <button class="tab" data-view="hourly">按小时</button>
      <button class="tab" data-view="weekly">按周</button>
    </div>

    <div class="chart-wrapper">
      <canvas id="fire-chart"></canvas>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script type="module" src="js/chart.js"></script>
</body>
</html>
