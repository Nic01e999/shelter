<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shelter</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/circle.css">
  <link rel="stylesheet" href="css/panel.css">
  <link rel="stylesheet" href="css/todo.css">
  <link rel="stylesheet" href="css/fire.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/audio.css">
</head>
<body>
  <div class="container">
    <div class="circle-track"></div>
  </div>
  <div class="panel">
    <div id="panel-display" class="hidden">
      <input type="text" id="itemText" placeholder="选择一个项目">
      <div class="todo-list" id="todoList">
        <div class="todo-item">
          <input type="checkbox" class="todo-checkbox">
          <div class="todo-input" contenteditable="true" data-placeholder="待办事项"></div>
        </div>
      </div>
    </div>
    <div id="panel-control">
      <button id="addBtn">add</button>
      <button id="deleteBtn">delete</button>
      <button id="task-break">TB</button>
      <button id="logout-btn" style="background: #ff8c42; color: #1a1a1a;">登出</button>
    </div>
    <div id="panel-modefire">
      <button id="fire-toggle" class="fire-btn">🔥</button>
      <a href="chart.html" target="_blank" id="fire-timer" class="fire-timer-link">00:00:00</a>
    </div>
    <div id="panel-audio">
      <h3>🎵 White Noise</h3>
      <div class="audio-controls">
        <button id="audio-toggle" class="audio-btn">▶️ Play</button>
        <select id="audio-source" class="audio-select">
          <option value="rain">Rain</option>
          <option value="ocean">Ocean</option>
          <option value="cafe">Cafe</option>
          <option value="universe">Universe</option>
        </select>
      </div>
    </div>

  </div>
  <div class="pet" >
    <img id="petImg" src="access/image/cat.jpeg">
    <div id="chat-window">
      <div class="chat-messages"></div>
      <div class="chat-input-container">
        <input type="text" class="chat-input" placeholder="输入消息...">
        <button class="chat-send-btn">发送</button>
      </div>
    </div>
  </div>

  <audio id="white-noise-audio" preload="auto"></audio>
  <script src="js/api.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
