<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shelter</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/circle.css">
  <link rel="stylesheet" href="css/panel.css">
  <link rel="stylesheet" href="css/todo.css">
  <link rel="stylesheet" href="css/fire.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/audio.css">
  <link rel="stylesheet" href="css/pet.css">
</head>
<body>
  <div id="chat-overlay" class="chat-overlay"></div>
  <div class="container">
    <div class="circle-track"></div>
  </div>
  <div class="panel-container">
    <div id="panel-display" class="hidden panel">
      <input type="text" id="itemText" placeholder="选择一个项目">
      <div class="todo-list" id="todoList">
        <div class="todo-item">
          <input type="checkbox" class="todo-checkbox">
          <div class="todo-input" contenteditable="true" data-placeholder="待办事项"></div>
        </div>
      </div>
    </div>
    <div class="panels-right">
      <div id="panel-control" class="panel">
        <button id="addBtn">add</button>
        <button id="deleteBtn">delete</button>
        <button id="task-break">TB</button>
      </div>
      <div id="panel-audio" class="panel">
        <div class="audio-controls">
          <button id="audio-toggle" class="audio-btn">▶️ Play</button>
          <select id="audio-source" class="audio-select">
            <option value="rain">Rain</option>
            <option value="ocean">Ocean</option>
            <option value="cafe">Cafe</option>
            <option value="universe">Universe</option>
          </select>
        </div>
      </div>
      <div id="panel-modefire" class="panel">
        <button id="fire-toggle" class="fire-btn">🔥</button>
        <a href="chart.html" target="_blank" id="fire-timer" class="fire-timer-link">00:00:00</a>
      </div>
      <div id="book-mark" class="panel">
      <button id="logout-btn" style="background: #2ddefd; color: #1a1a1a;">登出</button>
        <button id="guide">i</button>
      </div>
    </div>
  </div>
  <div class="pet">
    <div class="pet-layers">
      <img class="pet-layer pet-layer-1" src="access/image/cat1.PNG">
      <img class="pet-layer pet-layer-2" src="access/image/cat2.PNG">
      <img class="pet-layer pet-layer-3" src="access/image/cat3.PNG">
    </div>
    <div id="chat-window" class="chat-window">
      <div class="chat-messages"></div>
      <div class="chat-input-container">
        <input type="text" class="chat-input" placeholder="输入消息...">
        <button class="chat-send-btn">发送</button>
      </div>
    </div>
  </div>

  <div id="tb-window" class="chat-window">
    <div class="chat-messages" id="tb-messages"></div>
    <div class="chat-input-container">
      <input type="text" class="chat-input" id="tb-input" placeholder="描述你的任务...">
      <button class="chat-send-btn" id="tb-send">拆解</button>
    </div>
  </div>

  <audio id="white-noise-audio" preload="auto"></audio>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pet.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
