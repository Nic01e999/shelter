<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHELTER - 登录</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">SHELTER</h1>

            <!-- 登录表单 -->
            <form id="login-form" class="auth-form active">
                <h2>登录</h2>
                <input type="email" id="login-username" placeholder="邮箱" required>
                <input type="password" id="login-password" placeholder="密码" required>
                <button type="submit">登录</button>
                <div class="auth-links">
                    <a href="#" data-form="register">注册账号</a>
                    <a href="#" data-form="reset">忘记密码？</a>
                </div>
            </form>

            <!-- 注册表单 -->
            <form id="register-form" class="auth-form">
                <h2>注册</h2>
                <input type="email" id="register-username" placeholder="邮箱" required>
                <input type="password" id="register-password" placeholder="密码（至少6位）" required>
                <input type="password" id="register-confirm" placeholder="确认密码" required>
                <button type="submit">注册</button>
                <div class="auth-links">
                    <a href="#" data-form="login">已有账号？登录</a>
                    <a href="#" data-form="verify" style="display:none;">验证</a>
                </div>
            </form>

            <!-- 重置密码表单 -->
            <form id="reset-form" class="auth-form">
                <h2>重置密码</h2>
                <input type="email" id="reset-username" placeholder="邮箱" required>
                <button type="submit">发送验证码</button>
                <div class="auth-links">
                    <a href="#" data-form="login">返回登录</a>
                </div>
            </form>

            <!-- 验证码表单 -->
            <form id="verify-form" class="auth-form">
                <h2>输入验证码</h2>
                <input type="email" id="verify-email" placeholder="邮箱" required readonly>
                <input type="text" id="verify-code" placeholder="验证码" required maxlength="6">
                <input type="password" id="verify-password" placeholder="新密码（至少6位）" style="display:none;">
                <button type="submit">确认</button>
                <div class="auth-links">
                    <a href="#" data-form="login">返回登录</a>
                </div>
            </form>

            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
